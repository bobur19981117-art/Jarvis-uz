name: Flutter APK Build From ZIP

on:
  push:
    branches: [ "main", "asosiy" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Unzip Project Files
      run: |
        unzip jarvis_uz.zip
        if [ -d "jarvis_uz" ]; then
          mv jarvis_uz/* .
          mv jarvis_uz/.* . 2>/dev/null || true
          rm -rf jarvis_uz
        fi

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-app-apk
        path: build/app/outputs/flutter-apk/app-release.apk
